name: Build APK (robusto - versión fija)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF8"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y unzip wget git

      # --- Intento 1: usar acción para instalar Flutter con versión fija ---
      - name: Setup Flutter (acción) - versión fija
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'   # <- fijar aquí una versión concreta y estable
          cache: true

      - name: Verificar Flutter (acción)
        run: |
          echo "PATH: $PATH"
          flutter --version || true
        continue-on-error: true

      # --- Fallback: si flutter no está disponible, clonar SDK manualmente ---
      - name: Fallback: instalar Flutter manualmente si flutter no existe
        if: ${{ failure() || steps.setup_flutter.outcome == 'failure' || ! (hashFiles('**/pubspec.yaml')) }}
        run: |
          set -e
          if ! command -v flutter >/dev/null 2>&1; then
            echo "Flutter no encontrado: clonando SDK (fallback)..."
            cd $HOME
            if [ ! -d "$HOME/flutter" ]; then
              git clone -b stable https://github.com/flutter/flutter.git --depth 1 flutter || true
            fi
            echo "$HOME/flutter/bin" >> $GITHUB_PATH
            echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH
            flutter --version || true
          else
            echo "Flutter ya instalado"
          fi

      - name: Add Android tools to PATH
        run: |
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK components and accept licenses
        run: |
          sudo mkdir -p $ANDROID_SDK_ROOT
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2" || true
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true

      - name: Flutter doctor (detallado)
        run: flutter doctor -v

      - name: Flutter pub get
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test || true

      - name: Build APK (release, verbose)
        run: |
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build_output.log
        env:
          JAVA_TOOL_OPTIONS: ${{ env.JAVA_TOOL_OPTIONS }}

      - name: Upload APK artifact (si existe)
        uses: actions/upload-artifact@v4
        with:
          name: facturas-fijas-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_output.log
