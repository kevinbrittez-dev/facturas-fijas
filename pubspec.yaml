name: facturas_fijas
description: Aplicación offline para gestionar facturas fijas mensuales.
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.2.8
  path_provider: ^2.0.15
  path: ^1.8.3
  shared_preferences: ^2.1.1
  intl: ^0.18.1
  flutter_local_notifications: ^13.0.0
  permission_handler: ^10.4.0
  csv: ^5.0.0
  excel: ^2.0.2
  fl_chart: ^0.60.0
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
