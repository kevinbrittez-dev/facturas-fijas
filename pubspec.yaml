name: facturas_fijas
description: Aplicación 100% offline para gestionar facturas fijas mensuales (Luz, Internet, Alquiler, Netflix, Gym, etc.). Todo en español, Material 3, Hive + Riverpod + notificaciones automáticas + exportación Excel/CSV.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.70.0
  excel: ^2.1.1
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2
  intl: ^0.19.0
  uuid: ^4.5.0
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
